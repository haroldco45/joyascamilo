<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyería Finanzas | VIBRAS POSITIVAS HM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">💎 JoyeriApp Pro</h1>
        <p class="text-sm text-gray-500 italic">Organiza tu brillo, controla tu dinero</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="card p-4 text-center border-t-4 border-green-500">
            <p class="text-xs uppercase text-gray-500 font-bold">Ventas Totales</p>
            <p id="totalVentas" class="text-xl font-bold text-green-600">$ 0</p>
        </div>
        <div class="card p-4 text-center border-t-4 border-blue-500">
            <p class="text-xs uppercase text-gray-500 font-bold">Utilidad Neta</p>
            <p id="totalUtilidad" class="text-xl font-bold text-blue-600">$ 0</p>
        </div>
    </div>

    <div class="card p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4 border-b pb-2 text-gray-700">Registrar Nueva Pieza</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-600">Nombre de la Joya</label>
                <input type="text" id="nombreJoya" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-amber-400 outline-none" placeholder="Ej: Anillo de Plata">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-600">Costo Materiales</label>
                    <input type="number" id="costoMaterial" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-amber-400 outline-none" placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600">Precio Venta</label>
                    <input type="number" id="precioVenta" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-amber-400 outline-none" placeholder="0.00">
                </div>
            </div>
            <button onclick="agregarVenta()" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-lg transition duration-200">
                Guardar Venta
            </button>
        </div>
    </div>

    <div class="card p-6">
        <h2 class="text-lg font-semibold mb-4 text-gray-700">Historial de Ventas</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-xs uppercase text-gray-400 border-b">
                        <th class="py-2">Joya</th>
                        <th class="py-2">Venta</th>
                        <th class="py-2 text-right">Utilidad</th>
                    </tr>
                </thead>
                <tbody id="listaVentas" class="text-sm text-gray-600">
                    </tbody>
            </table>
        </div>
    </div>

    <footer class="mt-10 text-center border-t pt-4">
        <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">
            © 2026 Todos los derechos reservados a:
        </p>
        <p class="text-sm text-amber-600 font-extrabold">VIBRAS POSITIVAS HM</p>
    </footer>

    <script>
        let ventas = JSON.parse(localStorage.getItem('ventasJoyería')) || [];

        function agregarVenta() {
            const nombre = document.getElementById('nombreJoya').value;
            const costo = parseFloat(document.getElementById('costoMaterial').value);
            const venta = parseFloat(document.getElementById('precioVenta').value);

            if (!nombre || isNaN(costo) || isNaN(venta)) {
                alert("Por favor completa todos los campos correctamente.");
                return;
            }

            const utilidad = venta - costo;
            const nuevaVenta = { nombre, costo, venta, utilidad, fecha: new Date().toLocaleDateString() };

            ventas.push(nuevaVenta);
            localStorage.setItem('ventasJoyería', JSON.stringify(ventas));
            
            // Limpiar inputs
            document.getElementById('nombreJoya').value = '';
            document.getElementById('costoMaterial').value = '';
            document.getElementById('precioVenta').value = '';

            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const lista = document.getElementById('listaVentas');
            lista.innerHTML = '';
            
            let totalV = 0;
            let totalU = 0;

            ventas.forEach((v) => {
                totalV += v.venta;
                totalU += v.utilidad;
                
                const row = `<tr class="border-b">
                    <td class="py-3 font-medium">${v.nombre}</td>
                    <td class="py-3">$ ${v.venta.toLocaleString()}</td>
                    <td class="py-3 text-right text-green-600 font-bold">$ ${v.utilidad.toLocaleString()}</td>
                </tr>`;
                lista.innerHTML += row;
            });

            document.getElementById('totalVentas').innerText = `$ ${totalV.toLocaleString()}`;
            document.getElementById('totalUtilidad').innerText = `$ ${totalU.toLocaleString()}`;
        }

        // Cargar datos al iniciar
        actualizarInterfaz();
    </script>
</body>
</html>
